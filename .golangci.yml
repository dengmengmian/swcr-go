run:
  timeout: 3m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - gocritic
    - gofmt
    - goimports
    - revive
    - unconvert
    - unparam
    - nolintlint
    - predeclared
    - misspell
    - copyloopvar
  disable-all: true

linters-settings:
  errcheck:
    check-blank: false
    check-type-assertions: false
  gosec:
    excludes:
      - G104  # Unhandled errors are checked separately by errcheck
  govet:
    enable-all: true
    disable:
      - fieldalignment  # too noisy for a CLI tool
  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: empty-block
      - name: error-naming
      - name: error-return
      - name: error-strings
      - name: errorf
      - name: exported
        disabled: true  # internal package
      - name: if-return
      - name: increment-decrement
      - name: indent-error-flow
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: redefines-builtin-id
      - name: superfluous-else
      - name: time-naming
      - name: unexported-return
      - name: unreachable-code
      - name: unused-parameter
      - name: var-declaration
      - name: var-naming
  gocritic:
    enabled-tags:
      - diagnostic
      - performance

issues:
  exclude-dirs:
    - _reference
  exclude-files:
    - ".*\\.pb\\.go$"
  max-issues-per-linter: 0
  max-same-issues: 0

severity:
  default-severity: error
