# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: swcr
    main: ./cmd/swcr
    binary: swcr
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/dengmengmian/swcr-go/cmd/swcr.version={{.Version}}
      - -X github.com/dengmengmian/swcr-go/cmd/swcr.commit={{.Commit}}
      - -X github.com/dengmengmian/swcr-go/cmd/swcr.buildDate={{.Date}}

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        format: zip

changelog:
  disable: true

checksum:
  name_template: checksums.txt

release:
  draft: false
  prerelease: auto
